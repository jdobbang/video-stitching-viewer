<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panorama Video Viewer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            overflow: hidden; 
            background: #0a0a0f;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        #container { width: 100vw; height: 100vh; }
        
        .panel {
            position: absolute;
            background: rgba(0,0,0,0.85);
            padding: 16px 20px;
            border-radius: 12px;
            color: white;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        #video-controls {
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 16px;
            align-items: center;
            font-size: 13px;
        }
        
        #controls {
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 24px;
            align-items: center;
            font-size: 13px;
        }
        
        #mode-panel {
            top: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        #info {
            top: 20px;
            left: 20px;
            font-size: 13px;
            line-height: 1.6;
        }
        
        #file-panel {
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            padding: 40px 60px;
        }
        
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .control-group label {
            font-size: 11px;
            color: rgba(255,255,255,0.6);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .control-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        input[type="range"] { 
            width: 100px; 
            cursor: pointer;
            accent-color: #4a9eff;
        }
        
        #progress {
            width: 300px;
        }
        
        .value {
            min-width: 45px;
            text-align: right;
            font-family: monospace;
            font-size: 13px;
        }
        
        .btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
            width: 100%;
            text-align: left;
        }
        .btn:hover { background: rgba(255,255,255,0.2); }
        .btn.active { 
            background: rgba(74, 158, 255, 0.3); 
            border-color: #4a9eff;
        }
        
        .btn-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        
        #file-input {
            display: none;
        }
        
        .drop-zone {
            border: 2px dashed rgba(255,255,255,0.3);
            border-radius: 16px;
            padding: 40px;
            margin: 20px 0;
            cursor: pointer;
            transition: all 0.2s;
        }
        .drop-zone:hover {
            border-color: #4a9eff;
            background: rgba(74, 158, 255, 0.1);
        }
        .drop-zone.dragover {
            border-color: #4a9eff;
            background: rgba(74, 158, 255, 0.2);
        }
        
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 16px;
            display: none;
        }
    </style>
</head>
<body>
    <div id="container"></div>
    <div id="loading">비디오 로딩중...</div>
    
    <div class="panel" id="file-panel">
        <h2 style="margin-bottom: 8px;">🎬 Panorama Video Viewer</h2>
        <p style="color: rgba(255,255,255,0.6); margin-bottom: 16px;">파노라마 비디오를 3D로 감상하세요</p>
        
        <div class="drop-zone" id="drop-zone">
            <p style="font-size: 48px; margin-bottom: 16px;">📁</p>
            <p>비디오 파일을 드래그하거나 클릭하여 선택</p>
            <p style="font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 8px;">MP4, WebM, MOV 지원</p>
        </div>
        
        <input type="file" id="file-input" accept="video/*">
    </div>
    
    <div class="panel" id="info" style="display: none;">
        🖱️ 드래그: 시점 이동 &nbsp;|&nbsp; 🔍 스크롤: 줌 &nbsp;|&nbsp; ⌨️ ←→: 회전
    </div>
    
    <div class="panel" id="mode-panel" style="display: none;">
        <div style="font-size: 11px; color: rgba(255,255,255,0.6); margin-bottom: 4px;">투영 모드</div>
        <button class="btn active" data-mode="cylinder">🔵 Cylinder</button>
        <button class="btn" data-mode="plane">⬜ Flat Plane</button>
        <button class="btn" data-mode="sphere">🌐 Sphere</button>
    </div>
    
    <div class="panel" id="video-controls" style="display: none;">
        <button class="btn btn-icon" id="play-btn">▶</button>
        
        <div class="control-group">
            <div class="control-row">
                <span class="value" id="current-time">0:00</span>
                <input type="range" id="progress" min="0" max="100" value="0">
                <span class="value" id="duration">0:00</span>
            </div>
        </div>
        
        <div class="control-group">
            <label>속도</label>
            <select id="speed" style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 4px 8px; border-radius: 4px;">
                <option value="0.25">0.25x</option>
                <option value="0.5">0.5x</option>
                <option value="1" selected>1x</option>
                <option value="1.5">1.5x</option>
                <option value="2">2x</option>
            </select>
        </div>
    </div>
    
    <div class="panel" id="controls" style="display: none;">
        <div class="control-group">
            <label>Camera FOV</label>
            <div class="control-row">
                <input type="range" id="fov" min="20" max="90" value="50">
                <span class="value" id="fov-val">50°</span>
            </div>
        </div>
        
        <div class="control-group">
            <label>곡률 (Curve)</label>
            <div class="control-row">
                <input type="range" id="curve" min="0.5" max="2.0" step="0.05" value="1.0">
                <span class="value" id="curve-val">1.00</span>
            </div>
        </div>
        
        <div class="control-group">
            <label>거리 (Distance)</label>
            <div class="control-row">
                <input type="range" id="distance" min="0.5" max="3.0" step="0.1" value="1.0">
                <span class="value" id="distance-val">1.0</span>
            </div>
        </div>
        
        <div class="control-group">
            <label>비디오 회전</label>
            <div class="control-row">
                <button class="btn" id="rotate-ccw" style="width: auto; padding: 8px 12px;" title="반시계방향 90°">↺</button>
                <button class="btn" id="rotate-cw" style="width: auto; padding: 8px 12px;" title="시계방향 90°">↻</button>
            </div>
        </div>
        
        <button class="btn" id="reset" style="width: auto; padding: 8px 16px;">⟲ Reset</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, mesh, videoTexture, video;
        let currentMode = 'cylinder';
        let isUserInteracting = false;
        let onPointerDownMouseX = 0, onPointerDownMouseY = 0;
        let lon = 0, onPointerDownLon = 0;
        let lat = 0, onPointerDownLat = 0;
        let videoRotation = 0; // 비디오 회전 각도 (도)
        let rotationSpeed = 0; // 현재 회전 속도
        const ROTATION_RATE = 0.1; // 회전 속도 (도/프레임)
        
        // Default parameters (will be updated based on video)
        let IMG_WIDTH = 2850;
        let IMG_HEIGHT = 1109;
        let FOCAL_LENGTH = 1920;
        let TOTAL_FOV_RAD = IMG_WIDTH / FOCAL_LENGTH;

        const container = document.getElementById('container');
        const filePanel = document.getElementById('file-panel');
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');

        // File handling
        dropZone.addEventListener('click', () => fileInput.click());
        
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });
        
        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });
        
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('video/')) {
                loadVideo(file);
            }
        });
        
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                loadVideo(file);
            }
        });
        
        function loadVideo(file) {
            filePanel.style.display = 'none';
            document.getElementById('loading').style.display = 'block';
            
            video = document.createElement('video');
            video.src = URL.createObjectURL(file);
            video.crossOrigin = 'anonymous';
            video.loop = true;
            video.muted = false;
            video.playsInline = true;
            
            video.addEventListener('loadedmetadata', () => {
                IMG_WIDTH = video.videoWidth;
                IMG_HEIGHT = video.videoHeight;
                FOCAL_LENGTH = IMG_WIDTH * 0.67;  // Adjusted for typical panorama
                TOTAL_FOV_RAD = IMG_WIDTH / FOCAL_LENGTH;
                
                document.getElementById('loading').style.display = 'none';
                initThree();
                showControls();
            });
            
            video.addEventListener('error', () => {
                document.getElementById('loading').textContent = '비디오 로드 실패';
            });
            
            video.load();
        }
        
        function showControls() {
            document.getElementById('info').style.display = 'block';
            document.getElementById('mode-panel').style.display = 'flex';
            document.getElementById('video-controls').style.display = 'flex';
            document.getElementById('controls').style.display = 'flex';
        }
        
        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return `${m}:${s.toString().padStart(2, '0')}`;
        }

        function initThree() {
            scene = new THREE.Scene();
            
            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 0.1);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            container.appendChild(renderer.domElement);
            
            // Create video texture
            videoTexture = new THREE.VideoTexture(video);
            videoTexture.minFilter = THREE.LinearFilter;
            videoTexture.magFilter = THREE.LinearFilter;
            
            createGeometry('cylinder');
            
            // Event listeners
            container.addEventListener('pointerdown', onPointerDown);
            container.addEventListener('pointermove', onPointerMove);
            container.addEventListener('pointerup', onPointerUp);
            container.addEventListener('wheel', onWheel);
            window.addEventListener('resize', onResize);

            // Video controls
            const playBtn = document.getElementById('play-btn');
            const progress = document.getElementById('progress');
            const speedSelect = document.getElementById('speed');
            
            playBtn.addEventListener('click', () => {
                if (video.paused) {
                    video.play();
                    playBtn.textContent = '⏸';
                } else {
                    video.pause();
                    playBtn.textContent = '▶';
                }
            });
            
            video.addEventListener('timeupdate', () => {
                const pct = (video.currentTime / video.duration) * 100;
                progress.value = pct;
                document.getElementById('current-time').textContent = formatTime(video.currentTime);
            });
            
            video.addEventListener('loadedmetadata', () => {
                document.getElementById('duration').textContent = formatTime(video.duration);
            });
            
            progress.addEventListener('input', (e) => {
                const time = (e.target.value / 100) * video.duration;
                video.currentTime = time;
            });
            
            speedSelect.addEventListener('change', (e) => {
                video.playbackRate = parseFloat(e.target.value);
            });

            // View controls
            document.getElementById('fov').addEventListener('input', (e) => {
                camera.fov = parseFloat(e.target.value);
                camera.updateProjectionMatrix();
                document.getElementById('fov-val').textContent = e.target.value + '°';
            });

            document.getElementById('curve').addEventListener('input', (e) => {
                document.getElementById('curve-val').textContent = parseFloat(e.target.value).toFixed(2);
                createGeometry(currentMode);
            });
            
            document.getElementById('distance').addEventListener('input', (e) => {
                document.getElementById('distance-val').textContent = parseFloat(e.target.value).toFixed(1);
                createGeometry(currentMode);
            });

            document.getElementById('reset').addEventListener('click', resetView);
            
            // 비디오 회전 버튼 (마우스 누르고 있는 동안 회전)
            const rotateCcwBtn = document.getElementById('rotate-ccw');
            const rotateCwBtn = document.getElementById('rotate-cw');
            
            rotateCcwBtn.addEventListener('mousedown', () => rotationSpeed = -ROTATION_RATE);
            rotateCcwBtn.addEventListener('mouseup', () => rotationSpeed = 0);
            rotateCcwBtn.addEventListener('mouseleave', () => rotationSpeed = 0);
            rotateCcwBtn.addEventListener('touchstart', (e) => { e.preventDefault(); rotationSpeed = -ROTATION_RATE; });
            rotateCcwBtn.addEventListener('touchend', () => rotationSpeed = 0);
            
            rotateCwBtn.addEventListener('mousedown', () => rotationSpeed = ROTATION_RATE);
            rotateCwBtn.addEventListener('mouseup', () => rotationSpeed = 0);
            rotateCwBtn.addEventListener('mouseleave', () => rotationSpeed = 0);
            rotateCwBtn.addEventListener('touchstart', (e) => { e.preventDefault(); rotationSpeed = ROTATION_RATE; });
            rotateCwBtn.addEventListener('touchend', () => rotationSpeed = 0);
            
            // 방향키로 회전
            window.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowLeft') {
                    rotationSpeed = -ROTATION_RATE;
                    e.preventDefault();
                } else if (e.key === 'ArrowRight') {
                    rotationSpeed = ROTATION_RATE;
                    e.preventDefault();
                }
            });
            
            window.addEventListener('keyup', (e) => {
                if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
                    rotationSpeed = 0;
                }
            });
            
            // Mode buttons
            document.querySelectorAll('[data-mode]').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('[data-mode]').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentMode = btn.dataset.mode;
                    createGeometry(currentMode);
                });
            });

            // Start playback
            video.play().then(() => {
                document.getElementById('play-btn').textContent = '⏸';
            }).catch(() => {
                // Autoplay blocked, user needs to click play
            });
            
            animate();
        }
        
        function resetView() {
            lon = 0; lat = 0;
            videoRotation = 0;
            camera.fov = 50;
            camera.updateProjectionMatrix();
            document.getElementById('fov').value = 50;
            document.getElementById('fov-val').textContent = '50°';
            document.getElementById('curve').value = 1.0;
            document.getElementById('curve-val').textContent = '1.00';
            document.getElementById('distance').value = 1.0;
            document.getElementById('distance-val').textContent = '1.0';
            createGeometry(currentMode);
        }
        
        function applyVideoRotation() {
            if (mesh) {
                // 기본 회전 유지하면서 Z축 회전 추가
                if (currentMode === 'cylinder' || currentMode === 'sphere') {
                    mesh.rotation.z = THREE.MathUtils.degToRad(videoRotation);
                } else {
                    mesh.rotation.z = THREE.MathUtils.degToRad(videoRotation);
                }
            }
        }

        function createGeometry(mode) {
            if (!videoTexture) return;
            
            if (mesh) {
                scene.remove(mesh);
                mesh.geometry.dispose();
                mesh.material.dispose();
            }
            
            const curve = parseFloat(document.getElementById('curve').value);
            const distance = parseFloat(document.getElementById('distance').value);
            const radius = 50 * distance;
            
            let geometry;
            
            if (mode === 'cylinder') {
                const arcAngle = TOTAL_FOV_RAD * curve;
                const cylinderHeight = radius * arcAngle / (IMG_WIDTH / IMG_HEIGHT);
                
                geometry = new THREE.CylinderGeometry(
                    radius, radius, cylinderHeight,
                    64, 1, true,
                    -arcAngle / 2, arcAngle
                );
                geometry.scale(-1, 1, 1);
                
            } else if (mode === 'plane') {
                const planeWidth = radius * 2 * Math.tan(TOTAL_FOV_RAD / 2) * curve;
                const planeHeight = planeWidth / (IMG_WIDTH / IMG_HEIGHT);
                
                geometry = new THREE.PlaneGeometry(planeWidth, planeHeight, 1, 1);
                geometry.translate(0, 0, -radius);
                
            } else if (mode === 'sphere') {
                const phiLength = TOTAL_FOV_RAD * curve;
                const thetaLength = phiLength / (IMG_WIDTH / IMG_HEIGHT);
                
                geometry = new THREE.SphereGeometry(
                    radius,
                    64, 32,
                    Math.PI / 2 - phiLength / 2, phiLength,
                    Math.PI / 2 - thetaLength / 2, thetaLength
                );
                geometry.scale(-1, 1, 1);
            }
            
            const material = new THREE.MeshBasicMaterial({ 
                map: videoTexture,
                side: THREE.DoubleSide
            });
            
            mesh = new THREE.Mesh(geometry, material);
            
            if (mode === 'cylinder' || mode === 'sphere') {
                mesh.rotation.y = Math.PI;
            }
            
            // 비디오 회전 적용
            mesh.rotation.z = THREE.MathUtils.degToRad(videoRotation);
            
            scene.add(mesh);
        }

        function onPointerDown(event) {
            isUserInteracting = true;
            onPointerDownMouseX = event.clientX;
            onPointerDownMouseY = event.clientY;
            onPointerDownLon = lon;
            onPointerDownLat = lat;
        }

        function onPointerMove(event) {
            if (isUserInteracting) {
                lon = (onPointerDownMouseX - event.clientX) * 0.15 + onPointerDownLon;
                lat = (event.clientY - onPointerDownMouseY) * 0.15 + onPointerDownLat;
            }
        }

        function onPointerUp() {
            isUserInteracting = false;
        }

        function onWheel(event) {
            camera.fov = Math.max(20, Math.min(90, camera.fov + event.deltaY * 0.05));
            camera.updateProjectionMatrix();
            document.getElementById('fov').value = Math.round(camera.fov);
            document.getElementById('fov-val').textContent = Math.round(camera.fov) + '°';
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            
            // 비디오 연속 회전
            if (rotationSpeed !== 0 && mesh) {
                videoRotation += rotationSpeed;
                mesh.rotation.z = THREE.MathUtils.degToRad(videoRotation);
            }
            
            lat = Math.max(-45, Math.min(45, lat));
            const phi = THREE.MathUtils.degToRad(90 - lat);
            const theta = THREE.MathUtils.degToRad(lon);

            const x = 100 * Math.sin(phi) * Math.cos(theta);
            const y = 100 * Math.cos(phi);
            const z = 100 * Math.sin(phi) * Math.sin(theta);

            camera.lookAt(x, y, z);
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
